events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # HTTP - Ancien domaine -> redirection HTTPS nouveau domaine
    server {
        listen 80;
        listen [::]:80;
        server_name nio-far-tourisme.com www.nio-far-tourisme.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://niofartourisme.com$request_uri;
        }
    }

    # HTTPS - Ancien domaine -> redirection 301 vers nouveau domaine
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name nio-far-tourisme.com www.nio-far-tourisme.com;

        ssl_certificate /etc/letsencrypt/live/nio-far-tourisme.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nio-far-tourisme.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        return 301 https://niofartourisme.com$request_uri;
    }

    # HTTP - Nouveau domaine -> redirection vers HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name niofartourisme.com www.niofartourisme.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS - www.niofartourisme.com -> niofartourisme.com (canonical)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name www.niofartourisme.com;

        ssl_certificate /etc/letsencrypt/live/niofartourisme.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/niofartourisme.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        return 301 https://niofartourisme.com$request_uri;
    }

    # HTTPS Server - Nouveau domaine canonical
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name niofartourisme.com;

        ssl_certificate /etc/letsencrypt/live/niofartourisme.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/niofartourisme.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Jamais mis en cache — détection fiable des nouvelles versions
        location = /version.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Service Worker — jamais mis en cache (doit être rechargé à chaque visite)
        location = /ngsw-worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Service-Worker-Allowed "/";
        }

        # Fichiers de contrôle du Service Worker
        location ~* ^/(ngsw\.json|ngsw-worker\.js\.map|safety-worker\.js|manifest\.webmanifest)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        error_page 404 /index.html;
    }
}
